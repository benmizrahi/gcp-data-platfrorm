syntax = "proto3";

package platform.events.v1;

option go_package = "github.com/gcp-data-platform/schema-management/gen/platform/events/v1;eventsv1";
option java_multiple_files = true;
option java_outer_classname = "LevelProto";
option java_package = "com.platform.events.v1";

// LevelEvent contains details specific to a game-play level or course module progression.
message LevelEvent {
  // Replicated Timestamp message locally to avoid import errors in Pub/Sub.
  message Timestamp {
    int64 seconds = 1;
    int32 nanos = 2;
  }

  // Common telemetry fields (flattened)
  string event_id = 1;
  Timestamp timestamp = 2;
  string event_name = 3;
  string source = 4;
  string user_id = 5;

  // Actions taken on the level.
  enum LevelAction {
    LEVEL_ACTION_UNSPECIFIED = 0;
    LEVEL_ACTION_STARTED = 1;
    LEVEL_ACTION_COMPLETED = 2;
    LEVEL_ACTION_FAILED = 3;
    LEVEL_ACTION_RESTARTED = 4;
  }

  // Unique identifier or name of the level/module.
  string level_id = 6;

  // The level action that was triggered.
  LevelAction action = 7;

  // Score or points achieved, if applicable.
  int64 score = 8;

  // Duration spent in the level, in seconds.
  int32 duration_seconds = 9;
}
