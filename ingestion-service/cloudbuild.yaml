steps:
  # Step 1: Build the container image using the workspace root as context
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-ingestion-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ingestion-service:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ingestion-service:$COMMIT_SHA'
      - '-f'
      - 'ingestion-service/Dockerfile'
      - '.'

  # Step 2: Push the commit-tagged image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-commit-tag'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ingestion-service:$COMMIT_SHA'

  # Step 3: Push the latest-tagged image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest-tag'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ingestion-service:latest'

images:
  - 'gcr.io/$PROJECT_ID/ingestion-service:latest'
  - 'gcr.io/$PROJECT_ID/ingestion-service:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

